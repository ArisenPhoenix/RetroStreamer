app-id: io.github.ArisenPhoenix.ArchStreamer
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: archstreamer_gui
finish-args:
  # Network: discovery, session control, input, media
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  # Controllers / joysticks
  - --device=all
  # Local ROM / art / Steam grid import (read-write for art cache)
  - --filesystem=home
  - --filesystem=xdg-download
  - --filesystem=/mnt:ro
  - --talk-name=org.freedesktop.Notifications
  # Allow host RetroArch launch via flatpak-spawn --host when ArchStreamer itself is a Flatpak.
  - --talk-name=org.freedesktop.Flatpak
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/man
  - /share/doc
  - /share/aclocal
  - /bin/sdl2-config
  - '*.a'
  - '*.la'
modules:
  - name: nlohmann_json
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DJSON_BuildTests=OFF
      - -DJSON_Install=ON
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/archive/refs/tags/v3.12.0.tar.gz
        sha256: 4b92eb0c06d10683f7447ce9406cb97cd4b453be18d7279320f7b2f025c10187

  - name: sdl2
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL/releases/download/release-2.30.11/SDL2-2.30.11.tar.gz
        sha256: 8b8d4aef2038533da814965220f88f77d60dfa0f32685f80ead65e501337da7f

  - name: archstreamer
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DARCHSTREAMER_REQUIRE_GUI=ON
      - -DARCHSTREAMER_BUILD_CONTROLLER_PROBE=OFF
      - -DFETCHCONTENT_FULLY_DISCONNECTED=ON
    builddir: true
    sources:
      - type: dir
        path: ../..
    # With builddir: true, post-install runs from _flatpak_build/, so paths are relative to that.
    post-install:
      - install -Dm644 ../deploy/flatpak/io.github.ArisenPhoenix.ArchStreamer.desktop /app/share/applications/io.github.ArisenPhoenix.ArchStreamer.desktop
      - install -Dm644 ../deploy/flatpak/io.github.ArisenPhoenix.ArchStreamer.metainfo.xml /app/share/metainfo/io.github.ArisenPhoenix.ArchStreamer.metainfo.xml
      - install -Dm644 ../deploy/flatpak/icons/io.github.ArisenPhoenix.ArchStreamer.svg /app/share/icons/hicolor/scalable/apps/io.github.ArisenPhoenix.ArchStreamer.svg
      - install -Dm644 ../deploy/flatpak/icons/io.github.ArisenPhoenix.ArchStreamer.png /app/share/icons/hicolor/512x512/apps/io.github.ArisenPhoenix.ArchStreamer.png
